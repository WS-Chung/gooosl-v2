<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>정연이와 정우의 말랑말랑 구슬 팡팡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-deco" aria-hidden="true">
    <span style="left:6%;  top:12%; animation-delay:.2s;">☁️</span>
    <span style="left:88%; top:8%;  animation-delay:1.1s;">⭐</span>
    <span style="left:92%; top:62%; animation-delay:.6s;">🎈</span>
    <span style="left:4%;  top:72%; animation-delay:1.5s;">🌈</span>
    <span style="left:50%; top:4%;  animation-delay:.9s;">🍭</span>
    <span style="left:70%; top:88%; animation-delay:.3s;">🌟</span>
  </div>

  <main class="stage-wrap" role="main">
    <div class="topbar">
      <div class="title">정연이<span class="heart">💖</span>정우의 구슬 팡팡</div>
      <div id="stage-pill" class="stage-pill">1단계 / 10</div>
      <div id="progress-dots" class="progress-dots" aria-hidden="true"></div>
    </div>

    <div id="stage-title" class="stage-title">시작해볼까!</div>
    <div id="instruction" class="instruction">정연이랑 정우, 같이 시작해보자!</div>

    <div class="marble-area">
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
      <div id="marble-grid" class="marble-grid"></div>
      <div id="stage-banner" class="stage-banner" aria-hidden="true">
        <div class="pop-card">
          <h2 id="banner-title">1단계 성공!</h2>
          <p id="banner-text">다음 단계로 가보자!</p>
        </div>
      </div>
    </div>
  </main>

  <div id="train-overlay" class="train-overlay" aria-hidden="true">
    <div id="train" class="train"></div>
  </div>

  <canvas id="fireworks" class="fireworks" aria-hidden="true"></canvas>

  <div id="final-overlay" class="final-overlay" role="dialog" aria-modal="true">
    <div class="final-card">
      <h1>🎉 정연이💖정우, 모두 성공! 🎉</h1>
      <p>와~ 정연이랑 정우가 10단계를 다 통과했어!<br/>한 번 더 도전해볼까?</p>
      <button id="restart-btn" class="restart-btn" type="button">다시 하기 ✨</button>
    </div>
  </div>

  <script defer src="data.js"></script>
  <script defer src="game.js"></script>
</body>
</html>
